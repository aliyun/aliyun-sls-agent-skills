name: Package Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: alibabacloud-sls-cli-guidance
          path: .agents/skills/alibabacloud-sls-cli-guidance/
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd .agents/skills/alibabacloud-sls-cli-guidance
          zip -r "$GITHUB_WORKSPACE/alibabacloud-sls-cli-guidance.zip" .
          cd "$GITHUB_WORKSPACE"
          gh release upload "${{ github.event.release.tag_name }}" \
            alibabacloud-sls-cli-guidance.zip --clobber
